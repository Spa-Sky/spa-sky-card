<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPA-SKY — Контакты</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Manrope:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{
  background:linear-gradient(145deg,#f4f6fb 0%,#e8eef7 50%,#dde7f3 100%);
  font-family:'Manrope',sans-serif;
  display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
  color:#0a1530;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(180,210,240,.5) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 90%,rgba(220,230,245,.6) 0%,transparent 50%),
    radial-gradient(circle at 50% 50%,rgba(255,255,255,.4) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
.card{
  position:relative;z-index:1;
  width:100%;max-width:440px;
  background:linear-gradient(160deg,#ffffff 0%,#fafcff 50%,#f2f6fc 100%);
  border:1px solid rgba(180,145,60,.25);
  border-radius:4px;
  padding:2.8rem 2rem 2rem;
  overflow:hidden;
  box-shadow:
    0 30px 60px -20px rgba(30,50,100,.15),
    0 10px 30px -10px rgba(30,50,100,.08),
    0 0 0 1px rgba(255,255,255,.6) inset;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 300px 200px at 50% -10%,rgba(180,210,240,.35) 0%,transparent 70%),
    radial-gradient(ellipse 200px 150px at 100% 100%,rgba(200,168,75,.1) 0%,transparent 70%);
  pointer-events:none;
}
.corner{
  position:absolute;width:26px;height:26px;
  border:1px solid rgba(180,145,60,.5);
}
.corner.tl{top:12px;left:12px;border-right:none;border-bottom:none}
.corner.tr{top:12px;right:12px;border-left:none;border-bottom:none}
.corner.bl{bottom:12px;left:12px;border-right:none;border-top:none}
.corner.br{bottom:12px;right:12px;border-left:none;border-top:none}

.bubbles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.bubble{
  position:absolute;border-radius:50%;
  border:1px solid rgba(100,150,200,.25);
  background:rgba(200,220,240,.15);
  animation:rise linear infinite;
}
@keyframes rise{
  0%{transform:translateY(110%) scale(.6);opacity:0}
  15%{opacity:.8}
  85%{opacity:.4}
  100%{transform:translateY(-20%) scale(1);opacity:0}
}

.header{text-align:center;position:relative;z-index:2;margin-bottom:1.8rem}
.logo-wrap{
  display:flex;justify-content:center;margin-bottom:1rem;
  
}
.logo-wrap img{width:220px;height:auto;display:block}
.tagline{
  font-family:'Manrope',sans-serif;
  font-size:9px;font-weight:400;
  letter-spacing:.4em;text-transform:uppercase;
  color:#8a6d28;
  margin-top:.4rem;
}
.tagline .dot{color:rgba(180,145,60,.5);margin:0 6px}

.ornament{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin:1.5rem 0 1.8rem;
  position:relative;z-index:2;
}
.ornament .line{
  flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,145,60,.5),transparent);
  max-width:100px;
}
.ornament .diamond{
  width:6px;height:6px;background:#b4913c;
  transform:rotate(45deg);
}

.russian-title{
  text-align:center;
  font-family:'Manrope',sans-serif;
  font-size:10px;font-weight:400;
  letter-spacing:.35em;text-transform:uppercase;
  color:rgba(30,50,100,.55);
  margin-bottom:1.8rem;
  position:relative;z-index:2;
}

.contacts{
  display:flex;flex-direction:column;gap:.9rem;
  position:relative;z-index:2;
}
.contact{
  display:flex;align-items:center;gap:16px;
  text-decoration:none;
  padding:14px 16px;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(180,145,60,.15);
  border-radius:2px;
  transition:all .3s ease;
  position:relative;overflow:hidden;
  backdrop-filter:blur(10px);
}
.contact::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:#b4913c;
  transform:scaleY(0);transform-origin:top;transition:transform .3s ease;
}
.contact:hover{
  background:rgba(255,255,255,.95);
  border-color:rgba(180,145,60,.4);
  transform:translateX(3px);
  box-shadow:0 4px 15px rgba(30,50,100,.08);
}
.contact:hover::before{transform:scaleY(1)}
.c-icon{
  width:36px;height:36px;flex-shrink:0;
  border:1px solid rgba(180,145,60,.4);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(250,245,230,.6);
}
.c-icon svg{width:14px;height:14px}
.c-body{flex:1;min-width:0}
.c-label{
  font-size:8.5px;font-weight:500;
  letter-spacing:.3em;text-transform:uppercase;
  color:#8a6d28;
  margin-bottom:3px;
}
.c-value{
  font-size:13px;font-weight:500;
  color:#0a1530;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.contact:hover .c-value{color:#1a3870}

.footer{
  text-align:center;
  margin-top:1.8rem;padding-top:1.2rem;
  border-top:1px solid rgba(180,145,60,.2);
  position:relative;z-index:2;
}
.footer-text{
  font-size:9px;font-weight:400;
  letter-spacing:.35em;text-transform:uppercase;
  color:rgba(30,50,100,.5);
}
.founded{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:.3em;
  color:#8a6d28;
  margin-top:5px;
}
.toast{
  position:absolute;top:16px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:#b4913c;color:#fff;
  font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:500;
  padding:6px 14px;border-radius:2px;
  opacity:0;transition:all .3s ease;pointer-events:none;z-index:10;
  box-shadow:0 4px 12px rgba(180,145,60,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
